<!DOCTYPE html>
<html lang="cs">
<!-- Website created for Anna Labuťová - Neumimplavat -->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neumimplavat — Anna Labuťová</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=IM+Fell+English:ital@0;1&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --coral-pink: #F29A9E;
    --rose-red: #BF6061;
    --deep-brown: #572321;
    --dark-blue: #091F28;
    --teal-green: #204F4B;
    --paper-white: #fdfdf8;
    --soft-gray: #6b7280;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: url('./background.jpg') center center / cover no-repeat fixed;
    color: var(--deep-brown);
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
    position: relative;
    min-height: 100vh;
  }

  /* MAINTENANCE LOCK SCREEN */
  .maintenance-lock {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, var(--dark-blue), var(--teal-green));
    z-index: 10000;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
  }

  .maintenance-content {
    background: rgba(253,253,248,0.95);
    padding: 4rem 3rem;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(242,154,158,0.3);
    max-width: 500px;
    width: 90%;
  }

  .maintenance-icon {
    font-size: 4rem;
    margin-bottom: 2rem;
    color: var(--rose-red);
    animation: float 3s ease-in-out infinite;
  }

  .maintenance-title {
    font-family: 'Cinzel', serif;
    font-size: 2rem;
    color: var(--deep-brown);
    margin-bottom: 1.5rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
  }

  .maintenance-message {
    font-size: 1.2rem;
    line-height: 1.6;
    color: var(--soft-gray);
    margin-bottom: 1rem;
  }

  .maintenance-subtitle {
    font-size: 0.9rem;
    color: var(--teal-green);
    font-style: italic;
    opacity: 0.8;
    margin-bottom: 2rem;
  }

  /* PASSWORD ACCESS */
  .password-access {
    margin-top: 2rem;
    padding-top: 2rem;
    border-top: 1px solid rgba(32,79,75,0.2);
  }

  .password-input {
    width: 100%;
    padding: 0.8rem 1rem;
    border: 2px solid rgba(32,79,75,0.3);
    border-radius: 8px;
    background: rgba(253,253,248,0.8);
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    color: var(--deep-brown);
    transition: all 0.3s ease;
    margin-bottom: 1rem;
  }

  .password-input:focus {
    outline: none;
    border-color: var(--rose-red);
    background: rgba(253,253,248,1);
  }

  .password-input::placeholder {
    color: var(--soft-gray);
    opacity: 0.6;
  }

  .access-button {
    width: 100%;
    padding: 0.8rem;
    background: linear-gradient(135deg, var(--teal-green), var(--deep-brown));
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .access-button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
  }

  .error-message {
    color: var(--rose-red);
    font-size: 0.8rem;
    margin-top: 0.5rem;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .error-message.show {
    opacity: 1;
  }

  .police-tape {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 60px;
    background: repeating-linear-gradient(
      45deg,
      #ffff00,
      #ffff00 20px,
      #000000 20px,
      #000000 40px
    );
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 0.8rem;
    letter-spacing: 0.3em;
    color: #000;
    animation: slidePolice 10s linear infinite;
  }

  .police-tape-bottom {
    top: auto;
    bottom: 0;
    animation: slidePolice 10s linear infinite reverse;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
  }

  @keyframes slidePolice {
    0% { background-position: 0 0; }
    100% { background-position: 40px 0; }
  }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 768px) {
    .maintenance-content {
      padding: 3rem 2rem;
    }
    
    .maintenance-title {
      font-size: 1.5rem;
    }
    
    .maintenance-message {
      font-size: 1rem;
    }
    
    .police-tape {
      font-size: 0.6rem;
      height: 40px;
    }
  }
</style>
</head>

<body>
  <script>
    // MAINTENANCE MODE CONFIG - změň na false pro vypnutí údržby
    const MAINTENANCE_MODE = true;
    const ADMIN_PASSWORD = "umimplavat";
  </script>

  <!-- MAINTENANCE LOCK SCREEN -->
  <div class="maintenance-lock" id="maintenanceLock">
    <div class="police-tape">
      ⚠️ POLICIE ⚠️ ZÁKAZ VSTUPU ⚠️ POLICIE ⚠️ ZÁKAZ VSTUPU ⚠️
    </div>
    
    <div class="maintenance-content">
      <div class="maintenance-icon">🔧</div>
      <h1 class="maintenance-title">Údržba</h1>
      <p class="maintenance-message">
        Utonula jsem…<br>
        proto je toto místo pod dohledem policie
      </p>
      <p class="maintenance-subtitle">
        Web se brzy vrátí v plné kráse
      </p>
      
      <div class="password-access">
        <input 
          type="password" 
          class="password-input" 
          id="passwordInput"
          placeholder="Zadejte přístupové heslo..."
        >
        <button class="access-button" onclick="checkPassword()">
          Vstoupit
        </button>
        <div class="error-message" id="errorMessage">
          Nesprávné heslo!
        </div>
      </div>
    </div>
    
    <div class="police-tape police-tape-bottom">
      ⚠️ POLICIE ⚠️ ZÁKAZ VSTUPU ⚠️ POLICIE ⚠️ ZÁKAZ VSTUPU ⚠️
    </div>
  </div>

  <script>
    // Maintenance mode logic
    if (!MAINTENANCE_MODE) {
      document.getElementById('maintenanceLock').style.display = 'none';
    }

    // Password check function
    function checkPassword() {
      const input = document.getElementById('passwordInput');
      const errorMsg = document.getElementById('errorMessage');
      
      if (input.value === ADMIN_PASSWORD) {
        document.getElementById('maintenanceLock').style.display = 'none';
      } else {
        errorMsg.classList.add('show');
        input.value = '';
        input.style.borderColor = 'var(--rose-red)';
        
        setTimeout(() => {
          errorMsg.classList.remove('show');
          input.style.borderColor = 'rgba(32,79,75,0.3)';
        }, 3000);
      }
    }

    // Enter key support for password
    document.getElementById('passwordInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        checkPassword();
      }
    });
  </script>
</body>
</html>
